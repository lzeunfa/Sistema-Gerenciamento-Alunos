<form id="form_filtrosAlunos" action="" class="filter-form">

    <label for="filtrando">Escolha um filtro:</label>

    <select name="filtrando" id="filtrando">

        <option value="">=ESCOLHER=</option>

        <option value="alunos_pendentes">PENDENTES</option>

        <option value="alunos_pagos">PAGOS</option>

        <option value="plano_2">PLANO 2X</option>

        <option value="plano_3">PLANO 3X</option>

        <option value="plano_4">PLANO 4X</option>

        <option value="alunos_homens">Homens</option>

        <option value="alunos_mulheres">Mulheres</option>

    </select>

    <button type="submit">FILTRAR</button>

</form>
